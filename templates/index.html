<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f7931a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BTC Alert" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icon-192.svg" />
  <title>BTC Alert</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #f7931a;
      --accent2: #ffd166;
      --green: #06d6a0;
      --red: #ef476f;
      --text: #e8eaf0;
      --muted: #7b82a0;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky; top: 0; z-index: 10;
    }
    header .logo { font-size: 1.4rem; }
    header h1 { font-size: 1.05rem; font-weight: 600; }
    header .right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    header span.clock { color: var(--muted); font-size: 0.82rem; }

    #btn-install {
      display: none;
      padding: 6px 14px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
    }

    .container { max-width: 720px; margin: 0 auto; padding: 20px 14px; display: flex; flex-direction: column; gap: 16px; }

    .price-card {
      background: linear-gradient(135deg, #1a1d27 0%, #22263a 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .price-card .btc-icon { font-size: 2.2rem; }
    .price-card .price-info h2 { font-size: 1.8rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .price-card .price-info .sub { color: var(--muted); font-size: 0.8rem; margin-top: 3px; }
    .price-card .price-stats { margin-left: auto; display: flex; flex-direction: column; gap: 3px; text-align: right; }
    .price-card .price-stats span { font-size: 0.78rem; color: var(--muted); }
    .price-card .price-stats strong { font-size: 0.88rem; }
    .badge-up   { color: var(--green); }
    .badge-down { color: var(--red); }

    .next-run { font-size: 0.75rem; color: var(--muted); text-align: right; margin-top: -8px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .card h3 { font-size: 0.88rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 16px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }

    label { display: flex; flex-direction: column; gap: 5px; font-size: 0.82rem; color: var(--muted); }
    label strong { color: var(--text); font-size: 0.88rem; font-weight: 500; }
    input[type="text"], input[type="number"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.92rem;
      padding: 9px 12px;
      width: 100%;
      transition: border-color .15s;
    }
    input:focus { outline: none; border-color: var(--accent); }

    .threshold-grid {
      display: grid;
      grid-template-columns: 52px 1fr 1fr;
      gap: 8px 14px;
      align-items: center;
    }
    .threshold-grid .th { font-size: 0.75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
    .threshold-grid .period-label { font-size: 0.92rem; font-weight: 700; color: var(--accent2); }
    .input-suffix { position: relative; display: flex; align-items: center; }
    .input-suffix input { padding-right: 28px; }
    .input-suffix::after { content: attr(data-suffix); position: absolute; right: 10px; color: var(--muted); font-size: 0.82rem; pointer-events: none; }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    button { padding: 9px 18px; border-radius: 8px; border: none; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s; }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .5; cursor: default; }
    .btn-primary   { background: var(--accent); color: #000; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger    { background: transparent; color: var(--red); border: 1px solid var(--red); }

    .state-list { display: flex; flex-direction: column; gap: 8px; }
    .state-item { display: flex; align-items: center; gap: 10px; background: var(--surface2); border-radius: 8px; padding: 10px 14px; }
    .state-item .period { font-weight: 700; color: var(--accent2); width: 34px; font-size: 0.9rem; }
    .state-item .time { font-size: 0.84rem; flex: 1; }
    .state-item .cd { font-size: 0.75rem; color: var(--muted); }
    .state-item button { padding: 4px 10px; font-size: 0.75rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.active { background: var(--red); }
    .dot.free   { background: var(--green); }

    #toast {
      position: fixed; bottom: 20px; right: 16px; left: 16px; max-width: 400px; margin: auto;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px;
      font-size: 0.88rem; box-shadow: 0 8px 32px rgba(0,0,0,.4);
      transform: translateY(80px); opacity: 0;
      transition: all .25s; pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.ok  { border-color: var(--green); }
    #toast.err { border-color: var(--red); }

    .log-box {
      background: #0a0c14; border: 1px solid var(--border); border-radius: 8px;
      padding: 12px; font-family: monospace; font-size: 0.78rem;
      color: #a0ffb0; white-space: pre-wrap; max-height: 140px;
      overflow-y: auto; display: none; margin-top: 10px;
    }
    .log-box.visible { display: block; }
  </style>
</head>
<body>

<header>
  <span class="logo">₿</span>
  <h1>BTC Alert</h1>
  <div class="right">
    <span class="clock" id="clock"></span>
    <button id="btn-install">⬇ Instalar app</button>
  </div>
</header>

<div class="container">

  <div class="price-card">
    <div class="btc-icon">₿</div>
    <div class="price-info">
      <h2 id="price-last">—</h2>
      <div class="sub">BTC/BRL · Mercado Bitcoin</div>
    </div>
    <div class="price-stats">
      <span>Máx 24h</span><strong id="price-high">—</strong>
      <span>Mín 24h</span><strong id="price-low">—</strong>
      <span>Volume</span><strong id="price-vol">—</strong>
    </div>
  </div>
  <p class="next-run" id="next-run">Próxima verificação: —</p>

  <div class="card">
    <h3>📱 WhatsApp</h3>
    <div class="grid">
      <label>
        <strong>Número</strong>
        <input type="text" id="phone" placeholder="+5511987654321" />
        Com DDI e DDD
      </label>
      <label>
        <strong>CallMeBot API Key</strong>
        <input type="text" id="api_key" placeholder="123456" />
        Obtido via README_SETUP.md
      </label>
    </div>
  </div>

  <div class="card">
    <h3>🎯 Thresholds e Cooldowns</h3>
    <div class="threshold-grid">
      <div class="th">Período</div>
      <div class="th">Alerta se ≥</div>
      <div class="th">Cooldown</div>

      <div class="period-label">3h</div>
      <div class="input-suffix" data-suffix="%"><input type="number" id="t3h"  step="0.1" min="0" /></div>
      <div class="input-suffix" data-suffix="h"><input type="number" id="c3h"  step="0.5" min="0" /></div>

      <div class="period-label">6h</div>
      <div class="input-suffix" data-suffix="%"><input type="number" id="t6h"  step="0.1" min="0" /></div>
      <div class="input-suffix" data-suffix="h"><input type="number" id="c6h"  step="0.5" min="0" /></div>

      <div class="period-label">12h</div>
      <div class="input-suffix" data-suffix="%"><input type="number" id="t12h" step="0.1" min="0" /></div>
      <div class="input-suffix" data-suffix="h"><input type="number" id="c12h" step="0.5" min="0" /></div>

      <div class="period-label">24h</div>
      <div class="input-suffix" data-suffix="%"><input type="number" id="t24h" step="0.1" min="0" /></div>
      <div class="input-suffix" data-suffix="h"><input type="number" id="c24h" step="0.5" min="0" /></div>
    </div>
  </div>

  <div class="card">
    <h3>⚙️ Avançado</h3>
    <div class="grid">
      <label>
        <strong>Janela histórico (min)</strong>
        <input type="number" id="janela" step="1" min="1" />
        Aumente se houver erros
      </label>
    </div>
  </div>

  <div class="card">
    <h3>🚀 Ações</h3>
    <div class="actions">
      <button class="btn-primary"   onclick="salvar()">💾 Salvar</button>
      <button class="btn-secondary" onclick="testar()">📨 Testar WhatsApp</button>
      <button class="btn-secondary" onclick="verificar()">🔍 Verificar agora</button>
    </div>
    <div class="log-box" id="log-box"></div>
  </div>

  <div class="card">
    <h3>⏱️ Estado dos alertas</h3>
    <div class="state-list" id="state-list">
      <span style="color:var(--muted);font-size:.85rem">Carregando...</span>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
// ─── PWA Install ──────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js').catch(() => {});
}
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('btn-install').style.display = 'block';
});
document.getElementById('btn-install').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') document.getElementById('btn-install').style.display = 'none';
  deferredPrompt = null;
});

// ─── Formatação ───────────────────────────────────────────────────────────────
const BRL = v => 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});

// ─── Relógio ──────────────────────────────────────────────────────────────────
function tick() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('pt-BR'); }
tick(); setInterval(tick, 1000);

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3200);
}

// ─── Preço ────────────────────────────────────────────────────────────────────
async function fetchPrice() {
  try {
    const r = await fetch('/api/price').then(r => r.json());
    if (!r.ok) return;
    const d = r.data;
    const pct = ((d.last - d.open) / d.open) * 100;
    const el = document.getElementById('price-last');
    el.textContent  = BRL(d.last);
    el.className    = pct >= 0 ? 'badge-up' : 'badge-down';
    document.getElementById('price-high').textContent = BRL(d.high);
    document.getElementById('price-low').textContent  = BRL(d.low);
    document.getElementById('price-vol').textContent  = Number(d.vol).toFixed(4) + ' BTC';
  } catch(e) {}
}

async function fetchNextRun() {
  try {
    const r = await fetch('/api/scheduler').then(r => r.json());
    if (r.next_run) {
      const d = new Date(r.next_run);
      document.getElementById('next-run').textContent =
        'Próxima verificação: ' + d.toLocaleTimeString('pt-BR');
    }
  } catch(e) {}
}

fetchPrice(); setInterval(fetchPrice, 30000);
fetchNextRun(); setInterval(fetchNextRun, 30000);

// ─── Config ───────────────────────────────────────────────────────────────────
async function loadConfig() {
  const cfg = await fetch('/api/config').then(r => r.json());
  document.getElementById('phone').value    = cfg.phone;
  document.getElementById('api_key').value  = cfg.callmebot_api_key;
  document.getElementById('t3h').value      = cfg.thresholds['3h'];
  document.getElementById('t6h').value      = cfg.thresholds['6h'];
  document.getElementById('t12h').value     = cfg.thresholds['12h'];
  document.getElementById('t24h').value     = cfg.thresholds['24h'];
  document.getElementById('c3h').value      = cfg.cooldown_horas['3h'];
  document.getElementById('c6h').value      = cfg.cooldown_horas['6h'];
  document.getElementById('c12h').value     = cfg.cooldown_horas['12h'];
  document.getElementById('c24h').value     = cfg.cooldown_horas['24h'];
  document.getElementById('janela').value   = cfg.janela_historico_minutos;
}

async function salvar() {
  const body = {
    phone: document.getElementById('phone').value,
    callmebot_api_key: document.getElementById('api_key').value,
    threshold_3h:  document.getElementById('t3h').value,
    threshold_6h:  document.getElementById('t6h').value,
    threshold_12h: document.getElementById('t12h').value,
    threshold_24h: document.getElementById('t24h').value,
    cooldown_3h:   document.getElementById('c3h').value,
    cooldown_6h:   document.getElementById('c6h').value,
    cooldown_12h:  document.getElementById('c12h').value,
    cooldown_24h:  document.getElementById('c24h').value,
    janela_historico_minutos: document.getElementById('janela').value,
  };
  const r = await fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)}).then(r=>r.json());
  r.ok ? toast('✅ Configuração salva!') : toast('❌ Erro ao salvar', 'err');
}

// ─── Ações ────────────────────────────────────────────────────────────────────
function showLog(text) {
  const el = document.getElementById('log-box');
  el.textContent = text;
  el.classList.add('visible');
}

async function testar() {
  toast('Enviando mensagem de teste...');
  const r = await fetch('/api/test', {method:'POST'}).then(r=>r.json());
  showLog(r.output || r.error || '');
  r.ok ? toast('✅ Mensagem enviada!') : toast('❌ Falha no envio', 'err');
}

async function verificar() {
  toast('Verificando alertas...');
  const r = await fetch('/api/check', {method:'POST'}).then(r=>r.json());
  showLog(r.output || r.error || '');
  r.ok ? toast('✅ Verificação concluída!') : toast('❌ Erro', 'err');
}

// ─── Estado ───────────────────────────────────────────────────────────────────
async function loadState() {
  const [state, cfg] = await Promise.all([
    fetch('/api/state').then(r => r.json()),
    fetch('/api/config').then(r => r.json()),
  ]);
  const list = document.getElementById('state-list');
  list.innerHTML = '';
  for (const p of ['3h','6h','12h','24h']) {
    const lastStr    = state[p];
    const cooldownH  = cfg.cooldown_horas[p];
    let inCooldown   = false, timeStr = 'Nunca alertado', cdStr = 'Livre';
    if (lastStr) {
      const last  = new Date(lastStr);
      const diffH = (Date.now() - last.getTime()) / 3600000;
      inCooldown  = diffH < cooldownH;
      timeStr     = 'Último: ' + last.toLocaleString('pt-BR');
      cdStr       = inCooldown
        ? `Cooldown: ~${Math.ceil((cooldownH - diffH) * 60)}min`
        : 'Livre para alertar';
    }
    const item = document.createElement('div');
    item.className = 'state-item';
    item.innerHTML = `
      <div class="dot ${inCooldown ? 'active' : 'free'}"></div>
      <div class="period">${p}</div>
      <div class="time">${timeStr}<br><span class="cd">${cdStr}</span></div>
      ${lastStr ? `<button class="btn-danger" onclick="resetCooldown('${p}')">Reset</button>` : ''}`;
    list.appendChild(item);
  }
}

async function resetCooldown(p) {
  await fetch(`/api/state/${p}`, {method:'DELETE'});
  toast(`Cooldown de ${p} resetado`);
  loadState();
}

loadConfig();
loadState();
setInterval(loadState, 15000);
</script>
</body>
</html>
